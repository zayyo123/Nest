# 学习注释：这个 Nginx 配置用于“生产/容器环境”的前端。
# Vue 构建后只是静态 HTML/CSS/JS，Nginx 负责把这些文件发给浏览器。
server {
  listen 80;
  server_name localhost;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    # Vue Router 使用 history 模式时，/projects/1 这类路径并不存在真实文件。
    # try_files 找不到文件时回退到 index.html，让前端路由接管页面渲染。
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # 容器网络中 backend 是 docker-compose 里后端服务的名字。
    # 浏览器请求 /api/... 时，Nginx 会转发给 NestJS 的 3000 端口。
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
