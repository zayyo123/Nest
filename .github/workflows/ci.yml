name: CI

# 学习注释：on 表示什么时候触发 CI。
# 这里在推送 main 分支和向 main 发起 PR 时运行。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 后端检查：安装依赖、构建、单元测试、端到端测试。
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        # 后端命令都在 nest-app 目录执行，避免每一步重复 cd。
        working-directory: nest-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # 和 package.json engines 保持一致，CI 使用 Node 20。
          node-version: 20
          # 缓存 npm 依赖，加快重复运行速度。
          cache: npm
          cache-dependency-path: nest-app/package-lock.json

      - name: Install dependencies
        # npm ci 会严格按 package-lock.json 安装，适合 CI 环境。
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e

  # 前端检查：安装依赖、类型检查、生产构建。
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/vue-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        # vue-tsc 检查 .vue 和 .ts 文件里的 TypeScript 类型错误。
        run: npm run typecheck

      - name: Build
        # Vite 生产构建可以发现模板、导入、打包配置等问题。
        run: npm run build
