# 学习注释：这个文件定义 GitHub 上“Bug report”表单。
# 用户按表单填写后，维护者更容易复现和定位问题。
name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  # Summary 是必填项，用一句话描述出了什么问题。
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduce the bug.
      placeholder: |
        # 下面是多行占位示例，帮助提 issue 的人写出可复现步骤。
        1. Start the backend
        2. Open the frontend
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows 11, Node 20, Chrome 124"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      # render: shell 会让日志以代码块形式展示，方便阅读。
      render: shell
