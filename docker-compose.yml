version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: nest_mysql
    environment:
      MYSQL_DATABASE: nestlearn
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: nest_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: nestlearn
      DB_USER: root
      DB_PASSWORD: root
      DB_SYNCHRONIZE: 'true'
    ports:
      - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: nest_frontend
    depends_on:
      - backend
    ports:
      - '5173:80'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
